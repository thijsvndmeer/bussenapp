<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bussen Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    html,
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f3f4f6;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* --- 3D Card Flip --- */
    .perspective-1000 {
      perspective: 1000px;
    }

    .preserve-3d {
      transform-style: preserve-3d;
    }

    .backface-hidden {
      backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    /* --- Animations --- */
    @keyframes confetti-fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translate3d(-5px, 0, 0) rotate(-1deg);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translate3d(5px, 0, 0) rotate(1deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
        transform: scale(1.02);
      }
    }

    @keyframes gradient-xy {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes pop-in {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      70% {
        transform: scale(1.2);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    /* --- Utility Classes --- */
    .animate-shake {
      animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
    }

    .animate-pop {
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .bg-animated-gradient {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
      background-size: 400% 400%;
      animation: gradient-xy 15s ease infinite;
    }

    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .neon-text {
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);
    }
  </style>
  <style>
    /* --- Loading Screen Styles --- */
    @keyframes drive-across {
      0% { transform: translateX(-150%); }
      100% { transform: translateX(250%); }
    }
    @keyframes drive-across-reversed {
      0% { transform: translateX(250%) scaleX(-1); }
      100% { transform: translateX(-150%) scaleX(-1); }
    }
    @keyframes fill-progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    .loader-container {
      position: fixed;
      inset: 0;
      background-color: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 9999;
    }

    .loader-bus {
      position: absolute;
      color: #fb7185;
      pointer-events: none;
    }

    .bus-slow { top: 15%; left: 0; opacity: 0.1; animation: drive-across 4s infinite linear; }
    .bus-medium-rev { top: 45%; right: 0; opacity: 0.05; animation: drive-across-reversed 3s infinite linear; }
    .bus-fast { top: 65%; left: 0; opacity: 0.25; animation: drive-across 2s infinite linear; }

    .loader-content {
      position: relative;
      width: 100%;
      max-width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lead-bus {
      position: absolute;
      bottom: 100%;
      margin-bottom: 4px;
      color: #fb7185;
      animation: fill-progress var(--loader-dur, 0.8s) linear forwards;
      transform: translateX(-50%);
      left: 0;
    }

    .loader-bar-track {
      width: 100%;
      height: 12px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 99px;
      position: relative;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e11d48, #fb7185);
      border-radius: 99px;
      width: 0%;
      animation: fill-progress var(--loader-dur, 0.8s) linear forwards;
      position: relative;
      overflow: hidden;
    }

    .shimmer-inner {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 1s infinite;
    }

    .bus-svg {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 0 8px rgba(251, 113, 133, 0.6));
    }

    /* --- Instant Load & Completion Overrides --- */
    .loader-instant .lead-bus, .loader-complete .lead-bus {
      left: 100% !important;
      animation: none !important;
    }
    .loader-instant .loader-bar-fill, .loader-complete .loader-bar-fill {
      width: 100% !important;
      animation: none !important;
    }

    #loader-portal {
      transition: opacity 0.3s ease-out;
      pointer-events: none; /* Let clicks pass through once fading starts */
    }
    .loader-fading {
      opacity: 0 !important;
    }
  </style>
  <script>
    // --- Predictive Loading Script ---
    (function() {
      window.__loader_start = performance.now();
      const lastTimeStr = localStorage.getItem('last_load_dur');
      const lastTime = lastTimeStr ? parseInt(lastTimeStr) : 800;
      
      // If load is ultra-fast (< 50ms), snap to 100% instantly
      const isInstant = lastTime < 50;
      if (isInstant) {
        document.documentElement.classList.add('loader-instant');
      }
      
      const duration = isInstant ? 0 : Math.max(300, lastTime * 0.9);
      document.documentElement.style.setProperty('--loader-dur', duration + 'ms');
    })();
  </script>
</head>

<body>
  <!-- Static Loading Screen (Instant removal by React) -->
  <div id="loader-portal" class="loader-container">
    <!-- Background Buses -->
    <div class="loader-bus bus-slow">
      <svg class="bus-svg" style="width:120px; height:120px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4C2.9 6 1.9 6.8 1.6 7.8l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C.5 16.3 1 18 1 18h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h6"/><circle cx="17" cy="18" r="2"/></svg>
    </div>
    <div class="loader-bus bus-medium-rev">
      <svg class="bus-svg" style="width:80px; height:80px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4C2.9 6 1.9 6.8 1.6 7.8l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C.5 16.3 1 18 1 18h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h6"/><circle cx="17" cy="18" r="2"/></svg>
    </div>
    <div class="loader-bus bus-fast">
      <svg class="bus-svg" style="width:60px; height:60px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4C2.9 6 1.9 6.8 1.6 7.8l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C.5 16.3 1 18 1 18h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h6"/><circle cx="17" cy="18" r="2"/></svg>
    </div>

    <!-- Main Loader -->
    <div class="loader-content">
      <div class="lead-bus">
        <svg class="bus-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4C2.9 6 1.9 6.8 1.6 7.8l-1.4 5c-.1.4-.2.8-.2 1.2 0 .4.1.8.2 1.2C.5 16.3 1 18 1 18h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h6"/><circle cx="17" cy="18" r="2"/></svg>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill">
          <div class="shimmer-inner"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
