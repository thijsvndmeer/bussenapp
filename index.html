<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bussen Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      
      html, body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f3f4f6;
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
      }

      /* --- 3D Card Flip --- */
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }

      /* --- Animations --- */
      @keyframes confetti-fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      @keyframes shake {
        0%, 100% { transform: translate3d(0, 0, 0); }
        10%, 30%, 50%, 70%, 90% { transform: translate3d(-5px, 0, 0) rotate(-1deg); }
        20%, 40%, 60%, 80% { transform: translate3d(5px, 0, 0) rotate(1deg); }
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); transform: scale(1); }
        50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); transform: scale(1.02); }
      }

      @keyframes gradient-xy {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes pop-in {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }

      /* --- Utility Classes --- */
      .animate-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }
      
      .animate-pop {
        animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .bg-animated-gradient {
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
        background-size: 400% 400%;
        animation: gradient-xy 15s ease infinite;
      }

      @keyframes road-lines {
        from { background-position: 0 0, 0 0, 0 0, 0 0, 0 50%; }
        to { background-position: 0 50px, 0 0, 0 0, 40px 0, 100% 50%; }
      }

      .bg-animated-bus {
        background-color: #0b1224;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 35%),
          radial-gradient(circle at 80% 0%, rgba(248,113,113,0.08), transparent 30%),
          linear-gradient(0deg, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 6px, rgba(0,0,0,0) 6px, rgba(0,0,0,0) 22px),
          linear-gradient(-45deg, #111827, #1f2937, #0f172a, #0b1224);
        background-size: 250% 250%, 250% 250%, 100% 100%, 40px 100%, 400% 400%;
        animation: gradient-xy 8s ease infinite, road-lines 1s linear infinite;
      }

      .bus-happy.bg-animated-bus {
        background-image:
          radial-gradient(circle at 20% 20%, rgba(125,211,252,0.12), transparent 35%),
          radial-gradient(circle at 80% 0%, rgba(16,185,129,0.15), transparent 35%),
          linear-gradient(0deg, rgba(34,197,94,0.12), rgba(16,185,129,0.18)),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 6px, rgba(0,0,0,0) 6px, rgba(0,0,0,0) 22px),
          linear-gradient(-45deg, #0b1727, #0f2f2f, #0b1f2a, #0c2e3a);
        animation: gradient-xy 12s ease infinite, road-lines 1.4s linear infinite;
        filter: saturate(1.15);
      }

      .physical-bus-surface.bg-animated-bus {
        background-image: none;
        background: linear-gradient(150deg, #0b1224, #0f172a, #111827);
        transition: background 0.6s ease;
      }

      .physical-bus-surface.bus-complete.bg-animated-bus {
        background-image: none;
        background: linear-gradient(150deg, #0b2f2f, #0c3a34, #0ea5e9);
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .neon-text {
        text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.3);
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
